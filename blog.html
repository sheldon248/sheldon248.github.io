---
layout: default
title: 博客
---

<link rel="stylesheet" href="assets/style.css">

<div class="apple-section">
  <h1>博客</h1>

  <ul class="apple-post-list">
    {% for post in site.posts %}
      <li class="apple-post-item">
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
